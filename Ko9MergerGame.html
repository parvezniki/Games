<html>
<head>
    <title>Purrfect Merge</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
            text-align: center;
        }
        .animal {
            display: inline-block;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Purrfect Merge Game</h1>
    <div id="gameArea">
        <div class="animal" data-animal="cat"><img src="cat.png" alt="Cat"></div>
        <div class="animal" data-animal="dog"><img src="dog.png" alt="Dog"></div>
        <div class="animal" data-animal="rabbit"><img src="rabbit.png" alt="Rabbit"></div>
    </div>
    <script>
        let score = 0;
        let mergeableAnimals = [];

        const mergeAnimals = (animal1, animal2) => {
            // Logic for merging animals
            let newAnimal = `merged-${animal1}-${animal2}`;
            return newAnimal;
        };

        document.querySelectorAll('.animal').forEach(animal => {
            animal.addEventListener('click', () => {
                mergeableAnimals.push(animal.dataset.animal);
                if (mergeableAnimals.length == 2) {
                    let newAnimal = mergeAnimals(mergeableAnimals[0], mergeableAnimals[1]);
                    score += 10;
                    alert(`You merged a ${mergeableAnimals[0]} and a ${mergeableAnimals[1]} to create ${newAnimal}!`);
                    mergeableAnimals = [];
                }
            });
        });
    </script>
</body>
</html>
